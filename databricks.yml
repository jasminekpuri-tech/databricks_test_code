bundle:
  name: test-data-bundle

targets:
  dev:
    default: true
    mode: development

resources:
  jobs:
    write_test_data_job:
      name: "[Dev] Write Test Data Job"
      tasks:
        - task_key: run_python_script
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
          # Changed from spark_python_task to notebook_task:
          notebook_task:
            notebook_path: src/write_data.py

